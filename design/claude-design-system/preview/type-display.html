<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css">
<style>
  .specimen { display: flex; flex-direction: column; gap: 14px; }
  .line { display: grid; grid-template-columns: 88px 1fr; align-items: baseline; gap: 16px; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-2); letter-spacing: 0.04em; }
  .serif700 { font-family: var(--font-serif); font-weight:700; font-size: 44px; letter-spacing:-0.02em; line-height:1.1; }
  .serif600 { font-family: var(--font-serif); font-weight:600; font-size: 32px; letter-spacing:-0.02em; line-height:1.15; }
  .serif500i { font-family: var(--font-serif); font-weight:500; font-size: 22px; font-style: italic; color: var(--fg-1); }
</style></head><body>
<div class="card specimen">
  <div class="line"><span class="meta">Display 44 · 700</span><span class="serif700">A quiet day</span></div>
  <div class="line"><span class="meta">H1 32 · 600</span><span class="serif600">This week in focus</span></div>
  <div class="line"><span class="meta">H3 22 · italic</span><span class="serif500i">“Small moments, noticed.”</span></div>
</div></body></html>
