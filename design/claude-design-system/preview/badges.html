<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css">
<style>
  .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .badge { padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; letter-spacing: 0.02em; display: inline-flex; align-items: center; gap: 6px; }
  .badge .d { width: 6px; height: 6px; border-radius: 999px; }
  .workout { background: var(--dc-workout-soft);  color: var(--dc-workout); }
  .meal    { background: var(--dc-meal-soft);     color: var(--dc-meal); }
  .sleep   { background: var(--dc-sleep-soft);    color: var(--dc-sleep); }
  .mood    { background: var(--dc-mood-soft);     color: var(--dc-mood); }
  .activity{ background: var(--dc-activity-soft); color: var(--dc-activity); }
  .neutral { background: var(--dc-taupe);         color: var(--fg-2); }
  .solid   { background: var(--dc-sage); color: var(--fg-on-accent); }
  .outline { background: transparent; border: 1px solid var(--border-2); color: var(--fg-1); }
</style></head><body>
<div class="card">
  <div class="row">
    <span class="badge workout"><span class="d" style="background:var(--dc-workout)"></span>Workout</span>
    <span class="badge meal"><span class="d" style="background:var(--dc-meal)"></span>Meal</span>
    <span class="badge sleep"><span class="d" style="background:var(--dc-sleep)"></span>Sleep</span>
    <span class="badge mood"><span class="d" style="background:var(--dc-mood)"></span>Mood</span>
    <span class="badge activity"><span class="d" style="background:var(--dc-activity)"></span>Activity</span>
  </div>
  <div class="row">
    <span class="badge neutral">Draft</span>
    <span class="badge solid">Today</span>
    <span class="badge outline">Yesterday</span>
    <span class="badge outline">+2 more</span>
  </div>
</div></body></html>
