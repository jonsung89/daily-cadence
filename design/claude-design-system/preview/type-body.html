<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css">
<style>
  .line { display: grid; grid-template-columns: 88px 1fr; align-items: baseline; gap: 16px; padding: 6px 0; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-2); letter-spacing: 0.04em; }
  .b1 { font-family: var(--font-sans); font-weight:600; font-size: 20px; line-height:1.3; }
  .b2 { font-family: var(--font-sans); font-weight:500; font-size: 16px; line-height:1.5; }
  .b3 { font-family: var(--font-sans); font-weight:400; font-size: 16px; color: var(--fg-1); }
  .b4 { font-family: var(--font-sans); font-weight:400; font-size: 14px; color: var(--fg-2); }
  .b5 { font-family: var(--font-sans); font-weight:600; font-size: 12px; letter-spacing:0.08em; text-transform: uppercase; color: var(--fg-2); }
</style></head><body>
<div class="card">
  <div class="line"><span class="meta">H3 20 · 600</span><span class="b1">Today's notes</span></div>
  <div class="line"><span class="meta">Lead 16 · 500</span><span class="b2">You slept 7h 20m last night — a good amount.</span></div>
  <div class="line"><span class="meta">Body 16 · 400</span><span class="b3">Logged a 35 minute run and oatmeal with berries.</span></div>
  <div class="line"><span class="meta">Small 14 · 400</span><span class="b4">Synced 2 minutes ago</span></div>
  <div class="line"><span class="meta">Caption 12 · up</span><span class="b5">This morning</span></div>
</div></body></html>
