<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css">
<style>
  .scale { display: grid; grid-template-columns: repeat(9, 1fr); gap: 10px; align-items: end; }
  .box { background: var(--dc-sage-soft); border-radius: 4px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 6px; }
  .box span { font-family: var(--font-mono); font-size: 10px; color: var(--dc-sage-deep); font-weight: 600; }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--fg-2); text-align: center; margin-top: 4px; }
</style></head><body>
<div class="card">
  <div class="scale">
    <div><div class="box" style="height:8px;"></div><div class="label">4</div></div>
    <div><div class="box" style="height:14px;"></div><div class="label">8</div></div>
    <div><div class="box" style="height:20px;"></div><div class="label">12</div></div>
    <div><div class="box" style="height:28px;"></div><div class="label">16</div></div>
    <div><div class="box" style="height:40px;"></div><div class="label">24</div></div>
    <div><div class="box" style="height:52px;"></div><div class="label">32</div></div>
    <div><div class="box" style="height:68px;"></div><div class="label">48</div></div>
    <div><div class="box" style="height:80px;"></div><div class="label">64</div></div>
    <div><div class="box" style="height:92px;"></div><div class="label">96</div></div>
  </div>
  <div class="muted">8pt grid with a 4px half-step. Card padding defaults to 20–24px; section gaps to 32–48px.</div>
</div></body></html>
