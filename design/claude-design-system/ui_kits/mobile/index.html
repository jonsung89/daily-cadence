<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Daily Cadence — Mobile UI Kit</title>
  <link rel="stylesheet" href="../../colors_and_type.css?v=2" />
  <link rel="stylesheet" href="mobile.css?v=4" />
  <script src="../../theme-toggle.js?v=2"></script>
  <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="Timeline.jsx"></script>
  <script type="text/babel" src="NoteEditor.jsx"></script>
  <script type="text/babel" src="ProgressChart.jsx"></script>
  <script type="text/babel" src="CalendarView.jsx"></script>
  <script type="text/babel" src="Dashboard.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const App = () => {
      const [screen, setScreen] = useState("timeline");
      const [editorOpen, setEditorOpen] = useState(false);

      useEffect(() => {
        const t = setTimeout(() => { try { window.lucide && window.lucide.createIcons(); } catch(e){} }, 40);
        return () => clearTimeout(t);
      }, [screen, editorOpen]);

      const render = () => {
        if (editorOpen) return <NoteEditor onClose={() => setEditorOpen(false)} onSave={() => setEditorOpen(false)} />;
        switch (screen) {
          case "timeline":  return <Timeline onOpenEditor={() => setEditorOpen(true)} />;
          case "calendar":  return <CalendarView />;
          case "chart":     return <ProgressChart />;
          case "dashboard": return <Dashboard />;
          case "settings":  return <Timeline onOpenEditor={() => setEditorOpen(true)} />;
          default:          return <Timeline onOpenEditor={() => setEditorOpen(true)} />;
        }
      };

      return (
        <Phone>
          <div className="screen" data-screen-label={screen}>
            {render()}
            {!editorOpen && <TabBar active={screen} onNav={setScreen} />}
          </div>
        </Phone>
      );
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
